# This file configures the Nginx server that runs inside the frontend container.
# It is copied into the container by the frontend Dockerfile, replacing Nginx's
# default config. Nginx reads it on startup.

server {
    # Listen for incoming HTTP connections on port 80.
    listen 80;

    # Accept requests for any hostname (IP address, 'localhost', Pi hostname, etc.).
    server_name _;

    # The directory where Nginx looks for files to serve.
    # This is where the frontend Dockerfile copied the Vite build output (dist/).
    root /usr/share/nginx/html;

    # The default file to serve when a directory is requested.
    index index.html;

    # ── React SPA routing ────────────────────────────────────────────────────
    location / {
        # Try to serve the exact file or directory requested.
        # If neither exists, fall back to index.html.
        # This is required for React Router: without it, navigating to /recipes
        # directly (or refreshing the page) would return a 404 from Nginx because
        # there is no actual file at that path — React handles routing in the browser.
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        # Forward any request starting with /api/ to the backend container.
        # 'backend' is resolved by Docker's internal DNS — it matches the service
        # name in docker-compose.yml. Port 8080 is the Spring Boot default.
        # This replaces the proxy that Vite provided during local development.
        proxy_pass         http://backend:8080/api/;

        # Use HTTP 1.1 for the connection to the backend (supports keep-alive).
        proxy_http_version 1.1;

        # Forward the original Host header so the backend knows the real hostname.
        proxy_set_header   Host              $host;

        # Forward the client's real IP address to the backend.
        proxy_set_header   X-Real-IP         $remote_addr;

        # Append the client IP to the chain of proxies (standard header for tracing).
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
