# Production Docker Compose — used on the Raspberry Pi.
#
# Difference from docker-compose.yml: services use pre-built images pulled from
# GitHub Container Registry (GHCR) instead of building from local source.
# Images are built and pushed to GHCR manually from your Mac (see README),
# then pulled here by Ansible when deploying to the Pi.

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:17.9
    container_name: homelab-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Named volume so the database survives container restarts and rebuilds.
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    # Pull the pre-built image from GHCR instead of building from source.
    image: ghcr.io/quintero-daniel/homelab-backend:latest
    container_name: homelab-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    # Pull the pre-built image from GHCR instead of building from source.
    image: ghcr.io/quintero-daniel/homelab-frontend:latest
    container_name: homelab-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
