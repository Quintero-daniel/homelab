---
# Homelab — Raspberry Pi Provisioning Playbook
#
# What this playbook does, in order:
#   1. Installs Docker Engine via the official convenience script
#   2. Installs the Docker Compose plugin (so 'docker compose' works)
#   3. Configures Docker DNS (daemon.json) and system DNS (NetworkManager +
#      resolv.conf) so the Pi can resolve external registries like ghcr.io reliably
#   4. Adds the SSH user to the 'docker' group (no sudo needed for docker commands)
#   5. Creates the app directory on the Pi
#   6. Copies docker-compose.prod.yml to the Pi
#   7. Logs in to GHCR and pulls the latest images, then starts the stack
#      (step 7 is skipped if no .env file is present — see note below)
#
# Prerequisites:
#   - SSH access to the Pi: ssh acme@<pi-ip> must work from your Mac
#   - The Pi must have a .env file at ~/homelab/.env before step 6 runs.
#     Create it manually on the Pi first:
#       scp infra/docker/.env.example acme@<pi-ip>:~/homelab/.env
#       ssh acme@<pi-ip> "nano ~/homelab/.env"  # fill in real values
#   - Images must be pushed to GHCR from your Mac (see README) before pulling.
#
# Run this playbook from the repo root:
#   ansible-playbook -i infra/ansible/inventory.ini infra/ansible/playbook.yml \
#     --extra-vars "ghcr_token=YOUR_CLASSIC_PAT_HERE"
# To test connectivity first:
#   ansible -i infra/ansible/inventory.ini acme -m ping

- name: Provision Raspberry Pi
  hosts: acme
  # become: true runs tasks with sudo. Individual tasks that should NOT run as
  # root use 'become_user' to drop back to the SSH user.
  become: true

  tasks:

    # ── Docker Installation ──────────────────────────────────────────────────

    - name: Check if Docker is already installed
      # We check first so we don't re-run the install script on every run.
      command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false

    - name: Install Docker via the official convenience script
      # The official script detects the OS and installs the correct packages.
      # Equivalent to running: curl -fsSL https://get.docker.com | sh
      shell: curl -fsSL https://get.docker.com | sh
      when: docker_check.rc != 0

    - name: Install docker-compose-plugin
      # This provides the 'docker compose' (with a space) command.
      # It is separate from the legacy 'docker-compose' (with a hyphen) binary.
      apt:
        name: docker-compose-plugin
        state: present
        update_cache: true

    - name: Configure Docker DNS
      # Docker uses its own DNS resolver which may not inherit the system's DNS.
      # This sets explicit public DNS servers so the Docker daemon can resolve
      # external hostnames like ghcr.io for image pulls.
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "dns": ["8.8.8.8", "1.1.1.1"]
          }
        mode: "0644"
      notify: Restart Docker

    - name: Stop NetworkManager from managing resolv.conf
      # By default NetworkManager overwrites /etc/resolv.conf on every network
      # change, which would revert our custom DNS. Setting dns=none tells NM to
      # leave resolv.conf alone so our settings persist across reboots.
      copy:
        dest: /etc/NetworkManager/conf.d/custom-dns.conf
        content: |
          [main]
          dns=none
        mode: "0644"
      notify: Reload NetworkManager config

    - name: Write resolv.conf with reliable public DNS servers
      # Direct write is safe here because NetworkManager is configured above
      # to no longer touch this file.
      copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 8.8.8.8
          nameserver 1.1.1.1
        mode: "0644"

    - name: Flush handlers to apply DNS config before continuing
      # Forces the NetworkManager reload and Docker restart to run NOW so DNS
      # is working before the login and pull tasks attempt to reach ghcr.io.
      meta: flush_handlers

    - name: Add SSH user to the docker group
      # Without this, every docker command requires sudo.
      # Note: group membership only takes effect on the next login session.
      # Docker tasks in this playbook run as root (become: true) so they work
      # immediately without needing the group to be active.
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    # ── App Directory ────────────────────────────────────────────────────────

    - name: Create app directory on the Pi
      # This is where docker-compose.yml and .env will live on the Pi.
      file:
        path: /home/{{ ansible_user }}/homelab
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # ── Deploy Files ─────────────────────────────────────────────────────────

    - name: Copy docker-compose.prod.yml to the Pi
      # Copies the production compose file (uses GHCR image refs, not build).
      # On the Pi it is named docker-compose.yml so no extra flags are needed
      # when running 'docker compose' commands.
      copy:
        src: ../docker/docker-compose.prod.yml
        dest: /home/{{ ansible_user }}/homelab/docker-compose.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    # ── GHCR Authentication ──────────────────────────────────────────────────

    - name: Log in to GHCR
      # Authenticates Docker on the Pi so it can pull private images.
      # The token is passed at runtime via --extra-vars and never stored in this file.
      # no_log: true prevents the token from appearing in Ansible's output.
      # Runs as root (become: true is set at the play level) so docker group
      # membership is not required — group changes only take effect on new logins.
      shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u quintero-daniel --password-stdin
      no_log: true

    # ── Stack Deployment ─────────────────────────────────────────────────────

    - name: Check if .env file exists on the Pi
      # We gate the pull+start on the .env being present so the playbook does
      # not fail if you run it before setting up credentials on the Pi.
      stat:
        path: /home/{{ ansible_user }}/homelab/.env
      register: env_file

    - name: Warn if .env is missing
      debug:
        msg: >
          No .env file found at ~/homelab/.env — skipping image pull and stack
          start. Create the file on the Pi first, then re-run this playbook.
      when: not env_file.stat.exists

    - name: Pull latest images from GHCR
      # Pulls all images declared in docker-compose.yml from the registry.
      # Requires images to have been pushed from your Mac first (see README).
      shell: docker compose pull
      args:
        chdir: /home/{{ ansible_user }}/homelab
      when: env_file.stat.exists

    - name: Start the stack
      # -d runs containers in the background (detached mode).
      # If containers are already running, this restarts only changed ones.
      shell: docker compose up -d
      args:
        chdir: /home/{{ ansible_user }}/homelab
      when: env_file.stat.exists

  # Handlers run once at the end of the play, or immediately when flush_handlers
  # is called. Each handler only runs if it was notified by a task that changed.
  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

    - name: Reload NetworkManager config
      # 'nmcli general reload' reloads NetworkManager's configuration files
      # without restarting the service or dropping network connections.
      # This picks up the dns=none setting so NM stops overwriting resolv.conf.
      shell: nmcli general reload
